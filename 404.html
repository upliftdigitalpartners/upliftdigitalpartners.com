<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Uplift Digital Partner</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #0a2540; --teal: #1bb5a0; --cream: #f7f9fc; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    .code {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 700;
      line-height: 1;
      color: var(--teal);
      opacity: 0.2;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin: 1rem 0 0.75rem;
    }
    p { color: #6a7a92; font-size: 1.05rem; margin-bottom: 2rem; line-height: 1.7; }
    a {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: var(--teal);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s;
    }
    a:hover { background: #15a08c; transform: translateY(-2px); }
    .logo { width: 80px; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <img src="assets/images/logo-nav.png" alt="Uplift Digital Partner" class="logo">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
